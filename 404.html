<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Weiterleitung</title>
  <meta name="robots" content="noindex, nofollow">
  <script>
    (function () {
      var targetOrigin = "https://joergmartindigital.de";
      var targetUrl = targetOrigin + (window.location.pathname || "/") + (window.location.search || "") + (window.location.hash || "");
      window.location.replace(targetUrl);
    })();
  </script>
</head>
<body>
  <p>Weiterleitung... Falls nichts passiert, hier klicken:</p>
  <p><a href="https://joergmartindigital.de">https://joergmartindigital.de</a></p>
</body>
</html>
